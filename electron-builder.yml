appId: com.plumelens.app
productName: PlumeLens
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - "!node_modules"
extraResources:
  - from: engine
    to: engine
    filter:
      - "**/*"
      - "!__pycache__/**"
      - "!.venv/**"
      - "!*.pyc"
mac:
  target: dmg
  category: public.app-category.photography
  icon: build/icon.icns
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
win:
  target: nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
